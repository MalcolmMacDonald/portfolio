name: Claude Feature Development

on:
  issues:
    types: [ labeled ]

permissions: write-all

jobs:
  develop-feature:
    if: github.event.label.name == 'claude' && github.event.issue.user.login == github.repository_owner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: dev

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: |
            --dangerously-skip-permissions
            --mcp-config '{"mcpServers": {"val-town": {"type": "http","url": "https://api.val.town/v3/mcp"}},"headers": {"x-val-town-token": "${{secrets.VAL_TOWN_API_TOKEN}}"}}'
            --allowedTools "mcp__val-town__list_vals,mcp__val-town__list_files,mcp__val-town__read_file,mcp__val-town__create_val,mcp__val-town__update_file,mcp__val-town__update_val,mcp__val-town__sqlite_execute,mcp__val-town__run_file"
            --debug
          prompt: |
            You are implementing a feature for the cursed-apple-guesser project. Read CLAUDE.md for full project context.

            Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

            ${{ github.event.issue.body }}

            Steps to follow:
            1. Create and switch to a new branch named `feature/issue-${{ github.event.issue.number }}` from the current dev branch.
            2. Implement the feature described by the issue title (and body if present). Follow existing conventions: React 19 + TypeScript, inline styles, bun as package manager.
            3. Commit your changes with a clear, descriptive message referencing the issue.
            4. Push the branch and open a pull request targeting the `dev` branch. Title the PR "${{ github.event.issue.title }}" and include "Closes #${{ github.event.issue.number }}" in the body.
            5. Merge the PR immediately, as this workflow is designed for rapid development and deployment of features. Do not wait for reviews or checks to complete.
            6. After merging, post a comment on issue #${{ github.event.issue.number }} confirming that the feature has been merged and is now in the dev branch. Then close the issue.
